<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IberoTech — Modo mantenimiento</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="card shadow-sm p-4 text-center" style="max-width: 480px; width: 90%;">
    <h1 class="h5 fw-bold text-dark mb-2">🔧 IberoTech</h1>
    <p class="text-secondary mb-4">
      Página en mantenimiento.<br>
      Sube el <code>index.html</code> original para restaurar la web.
    </p>

    <input type="file" id="archivo" accept=".html" class="form-control mb-3">
    <button onclick="subir()" class="btn btn-warning w-100 fw-semibold">⬆ Restaurar web original</button>
    <div id="msg" class="mt-3" style="display:none;"></div>
  </div>

  <script>
    async function subir() {
      const archivo = document.getElementById('archivo').files[0];
      const msg     = document.getElementById('msg');
      msg.className = '';
      msg.textContent = '';
      msg.style.display = 'none';

      if (!archivo) {
        msg.textContent = 'Selecciona un archivo HTML primero.';
        msg.className = 'alert alert-danger';
        msg.style.display = 'block';
        return;
      }
      if (!archivo.name.endsWith('.html')) {
        msg.textContent = 'El archivo debe ser .html';
        msg.className = 'alert alert-danger';
        msg.style.display = 'block';
        return;
      }

      const form = new FormData();
      form.append('html_file', archivo);

      try {
        const res  = await fetch('/api/subir_web.php', { method: 'POST', body: form });
        const data = await res.json();
        if (data.ok) {
          msg.textContent = '✔ Web restaurada correctamente. Redirigiendo...';
          msg.className = 'alert alert-success';
          msg.style.display = 'block';
          setTimeout(() => window.location.href = '/', 2000);
        } else {
          msg.textContent = '✘ Error: ' + (data.error || 'desconocido');
          msg.className = 'alert alert-danger';
          msg.style.display = 'block';
        }
      } catch (e) {
        msg.textContent = '✘ No se pudo conectar con el servidor.';
        msg.className = 'alert alert-danger';
        msg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
